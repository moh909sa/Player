<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CinePlay Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Bebas+Neue&display=swap');
  :root { --bg:#080c10; --surface:#0d1117; --card:#111820; --border:#1e2a38; --accent:#e8a838; --accent2:#c47820; --text:#e8eaf0; --muted:#6b7a8d; --success:#2ecc71; --danger:#e74c3c; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Tajawal',sans-serif; min-height:100vh; }
  header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; background:rgba(8,12,16,.95); }
  .logo { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--accent); letter-spacing:3px; }
  .logo span { color:var(--text); opacity:.35; }
  main { max-width:900px; margin:0 auto; padding:20px 14px; }
  .section { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; position:relative; overflow:hidden; }
  .section::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); }
  .section-title { font-size:11px; text-transform:uppercase; letter-spacing:3px; color:var(--accent); margin-bottom:14px; font-weight:700; }
  textarea, input[type="text"], input[type="password"], select { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:11px 14px; color:var(--text); font-family:'Tajawal',sans-serif; font-size:13px; outline:none; transition:border-color .2s; width:100%; }
  textarea { resize:vertical; min-height:90px; direction:ltr; font-size:11px; line-height:1.6; font-family:monospace; }
  input[type="text"],input[type="password"] { direction:ltr; }
  input:focus,textarea:focus,select:focus { border-color:var(--accent); }
  input::placeholder,textarea::placeholder { color:var(--muted); font-size:12px; }
  .btn { padding:11px 18px; border-radius:8px; border:none; font-family:'Tajawal',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:all .2s; display:inline-flex; align-items:center; gap:6px; justify-content:center; }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#000; width:100%; margin-top:10px; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(232,168,56,.3); }
  .btn-secondary { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
  .btn-sm { padding:7px 12px; font-size:12px; width:auto; margin-top:0; }
  #playerWrap { display:none; background:#000; border-radius:12px; overflow:hidden; border:1px solid var(--border); margin-bottom:16px; position:relative; min-height:300px; }
  #playerWrap.active { display:block; }
  #webtorHolder { width:100%; min-height:300px; }
  #webtorHolder video { width:100%; max-height:520px; display:block; background:#000; }
  .sub-overlay { position:absolute; bottom:44px; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; width:90%; z-index:20; }
  .sub-text { display:inline-block; background:rgba(0,0,0,.85); color:#fff; font-family:'Tajawal',sans-serif; font-size:19px; font-weight:500; padding:5px 12px; border-radius:5px; line-height:1.5; }
  .status { padding:10px 14px; border-radius:8px; font-size:13px; margin-top:10px; display:none; align-items:center; gap:8px; }
  .status.active { display:flex; }
  .status.loading { background:rgba(232,168,56,.08); color:var(--accent); border:1px solid rgba(232,168,56,.2); }
  .status.error { background:rgba(231,76,60,.08); color:var(--danger); border:1px solid rgba(231,76,60,.2); }
  .status.success { background:rgba(46,204,113,.08); color:var(--success); border:1px solid rgba(46,204,113,.2); }
  .spinner { width:13px;height:13px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0; }
  @keyframes spin{to{transform:rotate(360deg);}}
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:12px; }
  .sub-results { display:grid; gap:7px; max-height:260px; overflow-y:auto; margin-top:12px; }
  .sub-results::-webkit-scrollbar{width:4px;}
  .sub-results::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .sub-item { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 14px; display:flex; align-items:center; gap:8px; transition:border-color .2s; }
  .sub-item:hover{border-color:rgba(232,168,56,.4);}
  .sub-item.loaded{border-color:var(--success);background:rgba(46,204,113,.04);}
  .sub-item-name{font-size:12px;direction:ltr;text-align:left;flex:1;}
  .sub-item-meta{font-size:11px;color:var(--muted);direction:ltr;}
  .upload-area{border-top:1px solid var(--border);margin-top:14px;padding-top:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .upload-btn{background:var(--surface);border:1px dashed var(--border);border-radius:7px;padding:7px 12px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;font-family:'Tajawal',sans-serif;}
  .upload-btn:hover{border-color:var(--accent);color:var(--accent);}
  .info-box{background:rgba(232,168,56,.05);border:1px solid rgba(232,168,56,.12);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--muted);line-height:1.9;margin-bottom:16px;}
  .info-box strong{color:var(--accent);}
  code{background:rgba(232,168,56,.1);color:var(--accent);padding:1px 5px;border-radius:3px;font-size:11px;direction:ltr;display:inline-block;}
</style>
</head>
<body>
<header>
  <div class="logo">CINE<span>PLAY</span></div>
  <div style="margin-right:auto;font-size:12px;color:var(--muted)">Webtor Embed + OpenSubtitles</div>
</header>
<main>

<div class="info-box">
  <strong>📋 كيف تستخدم:</strong><br>
  ١. في Webtor اضغط Stream على الفيلم ← انقر يمين ← View Page Source<br>
  ٢. ابحث عن <code>magnet:</code> وانسخ كل الكود من <code>&lt;video</code> حتى <code>&lt;/script&gt;</code><br>
  ٣. الصقه أدناه واضغط <strong>تشغيل</strong>
</div>

<div class="section">
  <div class="section-title">① كود Webtor Embed</div>
  <textarea id="embedCode" placeholder='<video controls src="magnet:?xt=urn:btih:..." data-path="/فيلم/حلقة.mkv"></video>
<script src="https://cdn.jsdelivr.net/npm/@webtor/embed-sdk-js/dist/index.min.js" charset="utf-8" async></script>'></textarea>
  <button class="btn btn-primary" onclick="loadEmbed()">▶ تشغيل</button>
  <div id="eStatus" class="status"></div>
</div>

<div id="playerWrap">
  <div id="webtorHolder"></div>
  <div class="sub-overlay" id="subOverlay"></div>
</div>

<div class="section" id="subSec" style="display:none">
  <div class="section-title">② ترجمة من OpenSubtitles</div>
  <div class="row">
    <input type="password" id="apiKey" placeholder="API Key من opensubtitles.com (مجاني)" style="flex:1">
    <button class="btn btn-secondary btn-sm" onclick="saveKey()">💾 حفظ</button>
    <span id="savedMsg" style="color:var(--success);font-size:12px;display:none;align-self:center">✓</span>
  </div>
  <div class="row">
    <input type="text" id="subQ" placeholder="اسم الفيلم..." style="flex:1;direction:rtl">
    <select id="langSel" style="width:auto;direction:rtl">
      <option value="ar">🇸🇦 عربي</option>
      <option value="en">🇺🇸 English</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="es">🇪🇸 Español</option>
      <option value="tr">🇹🇷 Türkçe</option>
    </select>
    <button class="btn btn-secondary btn-sm" onclick="searchSubs()">🔍 بحث</button>
  </div>
  <div id="sStatus" class="status"></div>
  <div id="subResults" class="sub-results"></div>
  <div class="upload-area">
    <span style="font-size:12px;color:var(--muted)">أو ارفع ملف SRT:</span>
    <input type="file" id="subFile" accept=".srt,.vtt" style="display:none" onchange="loadLocalSub(this)">
    <div class="upload-btn" onclick="document.getElementById('subFile').click()">📁 رفع SRT/VTT</div>
    <span id="localMsg" style="font-size:12px;color:var(--muted)"></span>
  </div>
</div>

</main>
<script>
let cues=[], timer=null;

window.onload=()=>{ const k=localStorage.getItem(‘osk’); if(k) document.getElementById(‘apiKey’).value=k; };
function saveKey(){ const k=document.getElementById(‘apiKey’).value.trim(); if(!k)return; localStorage.setItem(‘osk’,k); const m=document.getElementById(‘savedMsg’); m.style.display=‘inline’; setTimeout(()=>m.style.display=‘none’,2000); }
function getKey(){ return localStorage.getItem(‘osk’)||document.getElementById(‘apiKey’).value.trim(); }
function st(id,type,msg){ const e=document.getElementById(id); e.className=`status ${type} active`; e.innerHTML=type===‘loading’?`<div class="spinner"></div><span>${msg}</span>`:`<span>${msg}</span>`; }
function clr(id){ document.getElementById(id).className=‘status’; }

function loadEmbed(){
const code=document.getElementById(‘embedCode’).value.trim();
if(!code){ st(‘eStatus’,‘error’,‘⚠️ الصق كود Webtor أولاً’); return; }
const mm=code.match(/src=[”’](magnet:[^"']+)[”’]/);
const pm=code.match(/data-path=[”’]([^"']+)[”’]/);
if(!mm){ st(‘eStatus’,‘error’,‘❌ لم أجد magnet link — تأكد من الكود’); return; }
const magnet=mm[1], path=pm?pm[1]:’’;
const nm=path.match(//([^/]+).(mkv|mp4|avi)$/i);
if(nm){ let t=nm[1].replace(/(.*?)/g,’’).replace(/[.*?]/g,’’).replace(/S\d+E\d+.*/i,’’).replace(/[._-]+/g,’ ‘).trim(); document.getElementById(‘subQ’).value=t; }
st(‘eStatus’,‘loading’,‘جاري التشغيل عبر Webtor…’);
const h=document.getElementById(‘webtorHolder’); h.innerHTML=’’;
const old=document.querySelector(‘script[data-wt]’); if(old) old.remove();
const vid=document.createElement(‘video’);
vid.setAttribute(‘controls’,’’); vid.setAttribute(‘src’,magnet);
if(path) vid.setAttribute(‘data-path’,path);
vid.style.cssText=‘width:100%;background:#000;’;
h.appendChild(vid);
const sdk=document.createElement(‘script’);
sdk.src=‘https://cdn.jsdelivr.net/npm/@webtor/embed-sdk-js/dist/index.min.js’;
sdk.charset=‘utf-8’; sdk.setAttribute(‘data-wt’,‘1’);
sdk.onload=()=>{ setTimeout(()=>{ clr(‘eStatus’); document.getElementById(‘playerWrap’).classList.add(‘active’); document.getElementById(‘subSec’).style.display=‘block’; document.getElementById(‘playerWrap’).scrollIntoView({behavior:‘smooth’,block:‘start’}); if(cues.length) startSync(); },500); };
sdk.onerror=()=>st(‘eStatus’,‘error’,‘❌ فشل تحميل SDK’);
document.body.appendChild(sdk);
}

async function searchSubs(){
const q=document.getElementById(‘subQ’).value.trim(), lang=document.getElementById(‘langSel’).value, key=getKey();
if(!q){ st(‘sStatus’,‘error’,‘⚠️ أدخل اسم الفيلم’); return; }
st(‘sStatus’,‘loading’,`🔍 جاري البحث عن "${q}"...`);
document.getElementById(‘subResults’).innerHTML=’’;
try{
const h={‘Content-Type’:‘application/json’,‘User-Agent’:‘CinePlay/2’};
if(key) h[‘Api-Key’]=key;
const r=await fetch(`https://api.opensubtitles.com/api/v1/subtitles?query=${encodeURIComponent(q)}&languages=${lang}&per_page=15`,{headers:h});
if(r.status===401||r.status===403){ st(‘sStatus’,‘error’,‘❌ تحتاج API Key — سجّل مجاناً في opensubtitles.com’); showLinks(q,lang); return; }
const d=await r.json();
if(!d.data?.length){ st(‘sStatus’,‘error’,`❌ لا توجد ترجمة — جرب اسماً آخر`); showLinks(q,lang); return; }
clr(‘sStatus’); renderSubs(d.data);
}catch{ st(‘sStatus’,‘error’,‘❌ خطأ اتصال’); showLinks(q,lang); }
}

function showLinks(q,lang){
document.getElementById(‘subResults’).innerHTML=`<div style="text-align:center;padding:16px;color:var(--muted)"><p style="margin-bottom:10px">🔗 ابحث يدوياً:</p><div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap"><a href="https://www.opensubtitles.org/ar/search/sublanguageid-${lang}/moviename-${encodeURIComponent(q)}" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none">OpenSubtitles</a><a href="https://subdl.com/search?q=${encodeURIComponent(q)}" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none">Subdl</a><a href="https://subscene.com/subtitles/searchbytitle?query=${encodeURIComponent(q)}" target="_blank" class="btn btn-secondary btn-sm" style="text-decoration:none">Subscene</a></div><p style="margin-top:10px;font-size:11px">بعد التحميل ← ارفع SRT من الزر أدناه</p></div>`;
}

function renderSubs(subs){
const c=document.getElementById(‘subResults’); c.innerHTML=’’;
subs.forEach(s=>{ const a=s.attributes,f=a.files||[]; if(!f.length)return; const d=document.createElement(‘div’); d.className=‘sub-item’; d.innerHTML=`<div style="flex:1"><div class="sub-item-name">${a.release||a.feature_details?.title||'ترجمة'}</div><div class="sub-item-meta">⬇ ${a.download_count||0} · ${f[0]?.file_name||''}</div></div><button class="btn btn-secondary btn-sm" onclick="dlSub(${f[0]?.file_id},this)">⬇ تشغيل</button>`; c.appendChild(d); });
}

async function dlSub(id,btn){
const key=getKey(); if(!key){ st(‘sStatus’,‘error’,‘❌ أضف API Key’); return; }
btn.textContent=‘⏳’; btn.disabled=true;
try{
const r=await fetch(‘https://api.opensubtitles.com/api/v1/download’,{method:‘POST’,headers:{‘Content-Type’:‘application/json’,‘Api-Key’:key,‘User-Agent’:‘CinePlay/2’},body:JSON.stringify({file_id:id})});
const d=await r.json();
if(d.link){ const rt=await fetch(d.link); parseSRT(await rt.text()); btn.closest(’.sub-item’).classList.add(‘loaded’); btn.textContent=‘✓ مُحمَّل’; st(‘sStatus’,‘success’,‘✓ الترجمة تعمل!’); }
else throw new Error();
}catch{ btn.textContent=‘❌’; btn.disabled=false; }
}

function loadLocalSub(input){
const file=input.files[0]; if(!file)return;
const r=new FileReader();
r.onload=e=>{ parseSRT(e.target.result); document.getElementById(‘localMsg’).textContent=`✓ ${file.name}`; document.getElementById(‘localMsg’).style.color=‘var(–success)’; st(‘sStatus’,‘success’,‘✓ الترجمة جاهزة!’); };
r.readAsText(file,‘UTF-8’);
}

function parseSRT(text){
cues=[];
text.trim().replace(/\r\n/g,’\n’).split(/\n\n+/).forEach(b=>{
const ls=b.split(’\n’), tl=ls.find(l=>l.includes(’–>’));
if(!tl)return;
const toS=t=>{ const c=t.trim().replace(’,’,’.’),p=c.split(’:’); return p.length===3?+p[0]*3600 + +p[1]*60+parseFloat(p[2]):+p[0]*60+parseFloat(p[1]); };
const [rs,re]=tl.split(’–>’), txt=ls.slice(ls.indexOf(tl)+1).join(’\n’).replace(/<[^>]+>/g,’’).trim();
if(txt&&!isNaN(toS(rs))) cues.push({start:toS(rs),end:toS(re),text:txt});
});
startSync();
}

function startSync(){
if(timer)clearInterval(timer);
const ov=document.getElementById(‘subOverlay’);
timer=setInterval(()=>{ const v=document.querySelector(’#webtorHolder video’); if(!v)return; const t=v.currentTime, c=cues.find(x=>t>=x.start&&t<=x.end); ov.innerHTML=c?`<div class="sub-text">${c.text.replace(/\n/g,'<br>')}</div>`:’’; },100);
}

document.getElementById(‘subQ’).addEventListener(‘keydown’,e=>{ if(e.key===‘Enter’)searchSubs(); });
</script>

</body>
</html>
